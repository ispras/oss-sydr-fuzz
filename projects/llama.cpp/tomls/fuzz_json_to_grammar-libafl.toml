[sydr]
args = "--wait-jobs -s 90 -j2"
target = "/out_libafl/sydr/fuzz_json_to_grammar_sydr @@"

[difuzz]
path = "/directed_target/sydr/difuzz/libafl_difuzz"
target = "/out_libafl/libafl/fuzz_json_to_grammar_libafl @@"
args = "-j4 -l64 -i /corpus -e /out_libafl/difuzz/ets_fuzz_json_to_grammar.toml"
casr_bin = "/out_libafl/casr/fuzz_json_to_grammar_casr"

[cov]
target = "/out_libafl/cov/fuzz_json_to_grammar_cov @@"
